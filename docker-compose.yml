services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fbr-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "80:8000"
    depends_on:
      - mysql
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fbr-queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work --tries=3 --backoff=10

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fbr-scheduler
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    command: sh -c 'while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done'

  mysql:
    image: mysql:8.4
    container_name: fbr-mysql
    environment:
      MYSQL_DATABASE: fbr_digital_invoice
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: fbr
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: fbr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
